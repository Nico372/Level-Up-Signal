<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level-Up Signal — Explorateur GitHub</title>
<style>
  :root {
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #e2e2e5;
    --text: #1a1a1a;
    --text-secondary: #6b6b70;
    --accent: #2563eb;
    --accent-bg: #eaf1ff;
    --folder: #b58900;
    --mono: 'SF Mono', Consolas, 'Courier New', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  header .repo-link {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
  }
  header .repo-link:hover { color: var(--accent); }
  .branch-select {
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel);
    color: var(--text);
  }
  .container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .sidebar {
    width: 320px;
    min-width: 220px;
    max-width: 50%;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 10px;
    resize: horizontal;
  }
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }
  ul.tree {
    list-style: none;
    margin: 0;
    padding-left: 16px;
  }
  ul.tree.root {
    padding-left: 0;
  }
  .node {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13.5px;
    user-select: none;
    white-space: nowrap;
  }
  .node:hover {
    background: var(--accent-bg);
  }
  .node.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
  }
  .node .icon {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .node.folder .icon { color: var(--folder); }
  .node.file .icon { color: var(--text-secondary); }
  .children {
    display: none;
  }
  .children.open {
    display: block;
  }
  .placeholder {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 40px;
    text-align: center;
  }
  .file-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .file-header .path {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-secondary);
    word-break: break-all;
  }
  .file-header a {
    font-size: 12.5px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--panel);
    white-space: nowrap;
  }
  .file-header a:hover {
    background: var(--accent-bg);
  }
  pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    white-space: pre;
    tab-size: 2;
  }
  .markdown-body {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px 28px;
    line-height: 1.6;
    font-size: 15px;
    max-width: 800px;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3 {
    margin-top: 1.2em;
  }
  .markdown-body pre {
    border: none;
    background: var(--bg);
  }
  .markdown-body code {
    background: var(--bg);
    padding: 2px 5px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.9em;
  }
  .markdown-body img { max-width: 100%; }
  .loading, .error {
    text-align: center;
    color: var(--text-secondary);
    margin-top: 40px;
    font-size: 14px;
  }
  .error { color: #c0392b; }
  .img-preview {
    max-width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .html-preview {
    width: 100%;
    min-height: 400px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
  }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:14px;">
    <h1>📂 Level-Up Signal</h1>
    <select id="branchSelect" class="branch-select"></select>
  </div>
  <a class="repo-link" href="https://github.com/Nico372/Level-Up-Signal" target="_blank" rel="noopener">
    github.com/Nico372/Level-Up-Signal ↗
  </a>
</header>

<div class="container">
  <aside class="sidebar">
    <div id="treeContainer" class="loading">Chargement de l'arborescence…</div>
  </aside>
  <main class="main">
    <div id="content" class="placeholder">
      ← Sélectionnez un fichier dans l'arborescence pour afficher son contenu
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<script>
const OWNER = "Nico372";
const REPO = "Level-Up-Signal";
const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}`;

let currentBranch = null;
let activeNode = null;

async function init() {
  try {
    // Get repo info to find default branch + list of branches
    const repoRes = await fetch(API_BASE);
    if (!repoRes.ok) throw new Error(`Repo introuvable (${repoRes.status})`);
    const repoData = await repoRes.json();
    const defaultBranch = repoData.default_branch || "main";

    const branchesRes = await fetch(`${API_BASE}/branches`);
    const branches = branchesRes.ok ? await branchesRes.json() : [{ name: defaultBranch }];

    const select = document.getElementById("branchSelect");
    select.innerHTML = "";
    branches.forEach(b => {
      const opt = document.createElement("option");
      opt.value = b.name;
      opt.textContent = b.name;
      if (b.name === defaultBranch) opt.selected = true;
      select.appendChild(opt);
    });
    select.addEventListener("change", () => loadTree(select.value));

    currentBranch = defaultBranch;
    await loadTree(defaultBranch);
  } catch (err) {
    document.getElementById("treeContainer").innerHTML =
      `<div class="error">Erreur de chargement : ${escapeHtml(err.message)}</div>`;
  }
}

async function loadTree(branch) {
  currentBranch = branch;
  const treeContainer = document.getElementById("treeContainer");
  treeContainer.innerHTML = `<div class="loading">Chargement…</div>`;

  try {
    const res = await fetch(`${API_BASE}/git/trees/${branch}?recursive=1`);
    if (!res.ok) throw new Error(`Impossible de récupérer l'arborescence (${res.status})`);
    const data = await res.json();

    const rootNode = { name: "", type: "tree", children: {} };

    data.tree.forEach(item => {
      if (item.path === "index.html") return;
      // Skip nested trees that are too deep duplicates - we build structure from blobs/trees
      const parts = item.path.split("/");
      let cursor = rootNode;
      parts.forEach((part, idx) => {
        const isLast = idx === parts.length - 1;
        if (isLast) {
          if (item.type === "tree") {
            cursor.children[part] = cursor.children[part] || { name: part, type: "tree", children: {} };
          } else {
            cursor.children[part] = { name: part, type: "blob", path: item.path };
          }
        } else {
          cursor.children[part] = cursor.children[part] || { name: part, type: "tree", children: {} };
          cursor = cursor.children[part];
        }
      });
    });

    treeContainer.innerHTML = "";
    const ul = document.createElement("ul");
    ul.className = "tree root";
    renderNode(rootNode, ul, true);
    treeContainer.appendChild(ul);

  } catch (err) {
    treeContainer.innerHTML = `<div class="error">Erreur : ${escapeHtml(err.message)}</div>`;
  }
}

function renderNode(node, parentEl, isRoot) {
  const entries = Object.values(node.children).sort((a, b) => {
    if (a.type !== b.type) return a.type === "tree" ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  entries.forEach(child => {
    const li = document.createElement("li");
    const row = document.createElement("div");
    row.className = "node " + (child.type === "tree" ? "folder" : "file");

    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = child.type === "tree" ? "📁" : fileIcon(child.name);

    const label = document.createElement("span");
    label.textContent = child.name;

    row.appendChild(icon);
    row.appendChild(label);
    li.appendChild(row);

    if (child.type === "tree") {
      const childUl = document.createElement("ul");
      childUl.className = "tree children";
      renderNode(child, childUl, false);
      li.appendChild(childUl);

      row.addEventListener("click", () => {
        childUl.classList.toggle("open");
        icon.textContent = childUl.classList.contains("open") ? "📂" : "📁";
      });
    } else {
      row.addEventListener("click", () => {
        if (activeNode) activeNode.classList.remove("active");
        row.classList.add("active");
        activeNode = row;
        loadFile(child.path);
      });
    }

    parentEl.appendChild(li);
  });
}

function fileIcon(name) {
  const ext = name.split(".").pop().toLowerCase();
  const map = {
    md: "📄", markdown: "📄",
    json: "🧩", js: "📜", ts: "📜", html: "🌐", css: "🎨",
    png: "🖼️", jpg: "🖼️", jpeg: "🖼️", gif: "🖼️", svg: "🖼️",
    pdf: "📕", csv: "📊", xlsx: "📊",
    yml: "⚙️", yaml: "⚙️"
  };
  return map[ext] || "📄";
}

async function loadFile(path) {
  const content = document.getElementById("content");
  content.innerHTML = `<div class="loading">Chargement de ${escapeHtml(path)}…</div>`;

  const ext = path.split(".").pop().toLowerCase();
  const githubUrl = `https://github.com/${OWNER}/${REPO}/blob/${currentBranch}/${path}`;
  const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${currentBranch}/${path}`;

  const header = `
    <div class="file-header">
      <div class="path">${escapeHtml(path)}</div>
      <a href="${githubUrl}" target="_blank" rel="noopener">Voir sur GitHub ↗</a>
    </div>`;

  const imageExts = ["png", "jpg", "jpeg", "gif", "svg", "webp"];

  try {
    if (imageExts.includes(ext)) {
      content.innerHTML = header + `<img class="img-preview" src="${rawUrl}" alt="${escapeHtml(path)}">`;
      return;
    }

    const res = await fetch(rawUrl);
    if (!res.ok) throw new Error(`Impossible de charger le fichier (${res.status})`);
    const text = await res.text();

    if (ext === "md" || ext === "markdown") {
      const html = marked.parse(text);
      content.innerHTML = header + `<div class="markdown-body">${html}</div>`;
    } else if (ext === "html" || ext === "htm") {
      content.innerHTML = header + `<iframe class="html-preview" sandbox="allow-same-origin allow-scripts" referrerpolicy="no-referrer"></iframe>`;
      const iframe = content.querySelector(".html-preview");
      iframe.srcdoc = text;
      // some browsers need the property set, others the attribute via doc write
      iframe.addEventListener("load", () => {
        try {
          iframe.style.height = iframe.contentWindow.document.documentElement.scrollHeight + "px";
        } catch (e) {}
      });
    } else {
      content.innerHTML = header + `<pre><code>${escapeHtml(text)}</code></pre>`;
    }
  } catch (err) {
    content.innerHTML = header + `<div class="error">Erreur : ${escapeHtml(err.message)}</div>`;
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

init();
</script>

</body>
</html>
